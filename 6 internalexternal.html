6) EXTERNAL

<html>
<head> 
    <title>CSS Style Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: lightblue;
        }

        h1 {
            color: darkblue;
        }

        .internal-style {
            color: green;
            font-size: 20px;
        }
    </style>

    <link rel="stylesheet" type="text/css" href="6_style.css">
</head>

<body>

    <h1>Demonstration of CSS Styles</h1>

    <p style="color: red; font-size: 18px;">
        This is a paragraph with inline CSS styling.
    </p>

    <p class="internal-style">
        This paragraph uses internal CSS.
    </p>

    <p class="external-style">
        This paragraph uses external CSS.
    </p>
</body>
</html>

    color: purple;
