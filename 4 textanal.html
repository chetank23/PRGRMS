4 ) TEXT ANALYSIS 


<!DOCTYPE html>
<html>
<head>
    <title>Text Analysis</title>
    <script>
        function countText(event) {
            event.preventDefault();

            const text = document.getElementById("textInput").value;
            const len = text.length;
            const charCount = text.replace(/\s+/g, "").length;
            const wordCount = text.trim() ? text.trim().split(/\s+/).length : 0;
            const lineCount = text ? text.split(/\n/).length : 0;

            alert(`Length: ${len}
                   \nCharacters: ${charCount}
                   \nWords: ${wordCount}
                   \nLines: ${lineCount}`);
        }
    </script>
</head>

<body>
    <h1>Text Analysis Tool</h1>
    <form id="textForm" onsubmit="countText(event)">
        <label for="textInput">Enter your text below:</label><br><br>
        <textarea id="textInput" rows="10" cols="50" placeholder="Type or paste your text here..."></textarea>
        <br><br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
