<html>
<head>
    <title>Factorial Program</title>
    <script>
        function factorial(num) {
            if (num < 0) {
                return "Factorial not defined for negative numbers.";
            }
            var result = 1;
            for (var i = 1; i <= num; i++) {
                result *= i;
            }
            return result;
        }

        var n = parseInt(prompt("Enter a number to find its factorial:"));
        var factorialResult = factorial(n);
        alert("The factorial of " + n + " is: " + factorialResult);
    </script>
</head>
<body>
</body>
</html>

 <head><title> Multiplication Table </title></head> 
 <body> 
 <script type="text/javascript"> 
 var n=prompt("Enter positive value for n: "," "); 
if(!isNaN(n)) 
{ 
    var table=""; 
    var number=""; 
    for(i=1;i<=10;i++) { 
          number = n * i; 
           table += n + " * " + i + " = " + number + "\n"; 
      } 
    alert(table); 
} 
else { 
      alert("Enter positive value"); 
       n=prompt("Enter positive value for n: "," "); 
} 
document.write(n+" table values displayed using alert ..<br />"); 

</script>
