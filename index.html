<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Programs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: white;
            padding: 30px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .buttons-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            transition: all 0.2s;
        }

        button:hover {
            background: #f0f0f0;
            border-color: #999;
        }

        button.active {
            background: #333;
            color: white;
            border-color: #333;
        }

        .code-display {
            display: none;
            background: #f5f5f5;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow-x: auto;
        }

        .code-display.active {
            display: block;
        }

        pre {
            margin: 0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            color: #333;
        }

        .program-name {
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Programs</h1>
        
        <div class="buttons-container" id="buttonsContainer"></div>
        
        <div class="code-display" id="codeDisplay">
            <div class="program-name" id="programName"></div>
            <pre><code id="codeContent"></code></pre>
        </div>
    </div>

    <script>
        const programs = [
            { name: 'FormsValid', file: 'FormsValid.html' },
            { name: 'TextGrow', file: 'TextGrow.html' },
            { name: 'countrycap', file: 'countrycap.html' },
            { name: 'textanal', file: 'textanal.html' },
            { name: '5a-dFact', file: '5a-dFact.html' },
            { name: 'internalexternal', file: 'internalexternal.html' },
            { name: '7astackbox', file: '7astackbox.html' },
            { name: '7b.stackclean', file: '7b.stackclean.html' },
            { name: '8imageslider', file: '8imageslider.html' },
            { name: '9Textmani', file: '9 Textmani.html' }
        ];

        const container = document.getElementById('buttonsContainer');
        const codeDisplay = document.getElementById('codeDisplay');
        const programName = document.getElementById('programName');
        const codeContent = document.getElementById('codeContent');

        programs.forEach(prog => {
            const btn = document.createElement('button');
            btn.textContent = prog.name;
            btn.onclick = () => loadProgram(prog, btn);
            container.appendChild(btn);
        });

        function loadProgram(prog, btn) {
            // Remove active class from all buttons
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            // Add active class to clicked button
            btn.classList.add('active');

            // Load and display code
            fetch(prog.file)
                .then(response => response.text())
                .then(data => {
                    programName.textContent = prog.name;
                    codeContent.textContent = data;
                    codeDisplay.classList.add('active');
                })
                .catch(error => {
                    codeContent.textContent = 'Error loading code: ' + error;
                    codeDisplay.classList.add('active');
                });
        }
    </script>
</body>
</html>
