<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Programming Projects</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .content-wrapper {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .sidebar {
            background: white;
            border-radius: 10px;
            padding: 20px;
            height: fit-content;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            position: sticky;
            top: 20px;
        }

        .sidebar h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .programs-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .program-btn {
            padding: 12px 16px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .program-btn:hover {
            background: #667eea;
            color: white;
            transform: translateX(5px);
        }

        .program-btn.active {
            background: #667eea;
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .main-content {
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 20px;
        }

        .program-info {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .program-info h3 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .program-info p {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 15px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .view-code-btn {
            background: #667eea;
            color: white;
        }

        .view-code-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .open-program-btn {
            background: #10b981;
            color: white;
        }

        .open-program-btn:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
        }

        .code-viewer {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-height: 600px;
            overflow-y: auto;
            display: none;
        }

        .code-viewer.active {
            display: block;
        }

        .code-viewer h4 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .code-viewer pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 0.9em;
            line-height: 1.5;
        }

        .code-viewer code {
            font-family: 'Courier New', monospace;
        }

        .copy-btn {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: #764ba2;
        }

        .copy-btn.copied {
            background: #10b981;
        }

        .welcome-message {
            text-align: center;
            color: #999;
            padding: 40px;
            font-size: 1.2em;
        }

        @media (max-width: 768px) {
            .content-wrapper {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 2em;
            }

            .sidebar {
                position: static;
            }
        }

        .program-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .grid-btn {
            padding: 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s ease;
            text-align: center;
        }

        .grid-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .grid-btn.active {
            background: #667eea;
            color: white;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 My Programs</h1>
            <p>Click on any program to view its code</p>
        </header>

        <div class="program-grid" id="programGrid"></div>

        <div class="content-wrapper">
            <div class="sidebar">
                <h2>Programs</h2>
                <div class="programs-list" id="programsList"></div>
            </div>

            <div class="main-content">
                <div class="program-info" id="programInfo">
                    <div class="welcome-message">
                        👈 Select a program from the list to view its code
                    </div>
                </div>

                <div class="code-viewer" id="codeViewer">
                    <h4>Source Code</h4>
                    <button class="copy-btn" onclick="copyCode()">📋 Copy Code</button>
                    <pre><code id="codeContent"></code></pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        const programs = [
            { name: 'FormsValid', file: 'FormsValid.html', description: 'Form Validation Program' },
            { name: 'TextGrow', file: 'TextGrow.html', description: 'Text Growing Animation' },
            { name: 'countrycap', file: 'countrycap.html', description: 'Country Capital Quiz' },
            { name: 'textanal', file: 'textanal.html', description: 'Text Analysis Tool' },
            { name: '5a-dFact', file: '5a-dFact.html', description: 'Dynamic Fact Display' },
            { name: 'internalexternal', file: 'internalexternal.html', description: 'Internal External Reference' },
            { name: '7astackbox', file: '7astackbox.html', description: 'Stack Box Animation' },
            { name: '7b.stackclean', file: '7b.stackclean.html', description: 'Colored Stacked Returns' },
            { name: '8imageslider', file: '8imageslider.html', description: 'Image Slider' },
            { name: '9Textmani', file: '9 Textmani.html', description: 'Text Manipulation' }
        ];

        let currentProgram = null;

        // Initialize the page
        function init() {
            createProgramGrid();
            createProgramsList();
        }

        function createProgramGrid() {
            const grid = document.getElementById('programGrid');
            programs.forEach(prog => {
                const btn = document.createElement('button');
                btn.className = 'grid-btn';
                btn.textContent = prog.name;
                btn.onclick = () => loadProgram(prog);
                grid.appendChild(btn);
            });
        }

        function createProgramsList() {
            const list = document.getElementById('programsList');
            programs.forEach(prog => {
                const btn = document.createElement('button');
                btn.className = 'program-btn';
                btn.textContent = prog.name;
                btn.onclick = () => loadProgram(prog);
                list.appendChild(btn);
            });
        }

        function loadProgram(prog) {
            currentProgram = prog;
            updateActiveButtons();
            loadCode(prog.file);
            updateProgramInfo(prog);
        }

        function updateProgramInfo(prog) {
            const info = document.getElementById('programInfo');
            info.innerHTML = `
                <h3>${prog.name}</h3>
                <p>${prog.description}</p>
                <div class="action-buttons">
                    <button class="view-code-btn" onclick="toggleCodeViewer()">📝 View Code</button>
                    <button class="open-program-btn" onclick="openProgram('${prog.file}')">🚀 Open Program</button>
                </div>
            `;
        }

        function toggleCodeViewer() {
            const viewer = document.getElementById('codeViewer');
            viewer.classList.toggle('active');
        }

        function loadCode(filename) {
            fetch(filename)
                .then(response => response.text())
                .then(data => {
                    const codeContent = document.getElementById('codeContent');
                    codeContent.textContent = data;
                    document.getElementById('codeViewer').classList.remove('active');
                })
                .catch(error => {
                    document.getElementById('codeContent').textContent = 'Error loading code: ' + error;
                });
        }

        function copyCode() {
            const codeContent = document.getElementById('codeContent').textContent;
            navigator.clipboard.writeText(codeContent).then(() => {
                const btn = event.target;
                btn.textContent = '✓ Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '📋 Copy Code';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function openProgram(filename) {
            window.open(filename, '_blank');
        }

        function updateActiveButtons() {
            document.querySelectorAll('.program-btn, .grid-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === currentProgram.name) {
                    btn.classList.add('active');
                }
            });
        }

        // Initialize on page load
        init();
    </script>
</body>
</html>
