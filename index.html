<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Programs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: white;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .content-layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #333;
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 260px;
            flex-shrink: 0;
            max-height: 72vh;
            overflow-y: auto;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #ccc;
            background: white;
            border-radius: 4px;
            transition: all 0.2s;
            font-weight: 500;
            text-align: left;
        }

        button:hover {
            background: #f0f0f0;
            border-color: #999;
        }

        button.active {
            background: #222;
            color: #fff;
            border-color: #222;
        }

        .viewer {
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            flex: 1;
            min-width: 0;
            min-height: 72vh;
        }

        .viewer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid #ddd;
        }

        .viewer-header h2 {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .copy-btn {
            padding: 8px 14px;
            font-size: 14px;
        }

        .code-area {
            display: none;
            max-height: 65vh;
            overflow: auto;
            padding: 14px;
            white-space: pre;
            font-family: "Courier New", monospace;
            font-size: 14px;
            line-height: 1.45;
            color: #222;
        }

        .code-area.show {
            display: block;
        }

        .hint {
            color: #666;
            text-align: center;
            padding: 18px 0;
        }

        @media (max-width: 900px) {
            body {
                padding: 16px 12px;
            }

            h1 {
                margin-bottom: 16px;
                font-size: 24px;
            }

            .content-layout {
                flex-direction: column;
            }

            .buttons-container {
                width: 100%;
                max-height: none;
                overflow-y: visible;
            }

            button {
                text-align: center;
                padding: 10px 12px;
                font-size: 15px;
            }

            .viewer {
                min-height: 56vh;
            }

            .viewer-header {
                gap: 10px;
                flex-wrap: wrap;
                align-items: flex-start;
            }

            .code-area {
                max-height: 52vh;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Programs</h1>
        <div class="content-layout">
            <div class="buttons-container" id="buttonsContainer">
                <button data-file="1 FormsValid.html">1 FormsValid.html</button>
                <button data-file="2 TextGrow.html">2 TextGrow.html</button>
                <button data-file="3 countrycap.html">3 countrycap.html</button>
                <button data-file="4 textanal.html">4 textanal.html</button>
                <button data-file="5a-dFact.html">5a-dFact.html</button>
                <button data-file="6 internalexternal.html">6 internalexternal.html</button>
                <button data-file="7astackbox.html">7astackbox.html</button>
                <button data-file="7b.stackclean.html">7b.stackclean.html</button>
                <button data-file="8imageslider.html">8imageslider.html</button>
                <button data-file="9 Textmani.html">9 Textmani.html</button>
            </div>

            <div class="viewer">
                <div class="viewer-header">
                    <h2 id="currentFile">Select a button to view code</h2>
                    <button class="copy-btn" id="copyBtn" type="button">Copy Code</button>
                </div>
                <div class="hint" id="hint">Only code text is shown. Output is not executed.</div>
                <pre class="code-area" id="codeArea"></pre>
            </div>
        </div>
    </div>

    <script>
        const buttonsContainer = document.getElementById("buttonsContainer");
        const codeArea = document.getElementById("codeArea");
        const currentFile = document.getElementById("currentFile");
        const copyBtn = document.getElementById("copyBtn");
        const hint = document.getElementById("hint");
        const fileButtons = Array.from(document.querySelectorAll("#buttonsContainer button[data-file]"));
        const codeCache = new Map();

        let currentCode = "";

        function sanitizeCode(rawText) {
            return rawText.replace(/<!-- Code injected by live-server -->[\s\S]*?<\/script>\s*/g, "");
        }

        async function preloadAllCodes() {
            const preloadTasks = fileButtons.map(async (btn) => {
                const filename = btn.getAttribute("data-file");
                try {
                    const response = await fetch(filename);
                    if (!response.ok) throw new Error("fetch failed");
                    const text = await response.text();
                    codeCache.set(filename, sanitizeCode(text));
                } catch (error) {
                    codeCache.set(filename, "Unable to load code for " + filename);
                }
            });

            await Promise.all(preloadTasks);
        }
        

        buttonsContainer.addEventListener("click", async (event) => {
            const btn = event.target.closest("button[data-file]");
            if (!btn) return;

            const filename = btn.getAttribute("data-file");

            document.querySelectorAll("#buttonsContainer button").forEach((b) => {
                b.classList.remove("active");
            });
            btn.classList.add("active");

            currentFile.textContent = filename;

            if (!codeCache.has(filename)) {
                hint.style.display = "none";
                codeArea.textContent = "Loading...";
                codeArea.classList.add("show");
                try {
                    const response = await fetch(filename);
                    if (!response.ok) throw new Error("Could not read file");
                    const text = await response.text();
                    codeCache.set(filename, sanitizeCode(text));
                } catch (error) {
                    codeCache.set(filename, "Unable to load code for " + filename);
                }
            }

            currentCode = codeCache.get(filename) || "";
            codeArea.textContent = currentCode;
            hint.style.display = "none";
            codeArea.classList.add("show");
        });

        copyBtn.addEventListener("click", async () => {
            if (!currentCode) return;
            try {
                await navigator.clipboard.writeText(currentCode);
                const oldText = copyBtn.textContent;
                copyBtn.textContent = "Copied";
                setTimeout(() => {
                    copyBtn.textContent = oldText;
                }, 1200);
            } catch (error) {
                copyBtn.textContent = "Copy Failed";
                setTimeout(() => {
                    copyBtn.textContent = "Copy Code";
                }, 1200);
            }
        });

        preloadAllCodes();
    </script>
</body>
</html>
