7b)COLORED STACKED RETURNS  

<html lang="en">
<head>
    <title>Interactive Paragraphs</title>
    <style>
        .para {
            position: absolute;
            width: 300px;
            height: 50px;
            overflow: hidden;
            padding: 10px;
            border: 2px solid #000;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        #para1 {
            top: 100px;
            left: 200px;
            background-color: lightblue;
            z-index: 1;
        }

        #para2 {
            top: 140px;
            left: 220px;
            background-color: lightgreen;
            z-index: 2;
        }

        #para3 {
            top: 180px;
            left: 240px;
            background-color: lightcoral;
            z-index: 3;
        }
    </style>
</head>

<body>

<div class="para" id="para1"
     onmouseover="bringToFront('para1')"
     onmouseout="bringToBack('para1')">
    This is the first paragraph.
</div>

<div class="para" id="para2"
     onmouseover="bringToFront('para2')"
     onmouseout="bringToBack('para2')">
    This is the second paragraph.
</div>

<div class="para" id="para3"
     onmouseover="bringToFront('para3')"
     onmouseout="bringToBack('para3')">
    This is the third paragraph.
</div>

<script>
    var originalZ = {
        para1: 1,
        para2: 2,
        para3: 3
    };

    function bringToFront(id) {
        document.getElementById(id).style.zIndex = 10;
    }

    function bringToBack(id) {
        document.getElementById(id).style.zIndex = originalZ[id];
    }
</script>

</body>
</html>
